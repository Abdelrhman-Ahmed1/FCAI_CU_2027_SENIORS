<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCAI-CU 2027 Seniors | Profile Frame</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        header h1 {
            color: #003366;
            font-size: 28px;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            margin-bottom: 20px;
        }

        .btn {
            background-color: #003366;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
            display: inline-block;
            margin-top: 15px;
            width: 100%;
        }

        .btn:hover {
            background-color: #002244;
        }

        .btn-outline {
            background-color: #e0e7ff;
            color: #003366;
            border: 2px dashed #003366;
        }

        .btn-outline:hover {
            background-color: #c7d2fe;
        }

        input[type="file"] {
            display: none;
        }

        .step-section {
            display: none;
            margin-top: 20px;
        }

        .active-step {
            display: block;
        }

        .crop-container {
            max-width: 100%;
            max-height: 400px;
            margin: 0 auto 20px auto;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        #crop-image {
            max-width: 100%;
            display: block;
        }

        /* Forces the cropper frame to look circular and centered */
        .cropper-view-box,
        .cropper-face {
            border-radius: 50%;
        }
        
        .cropper-line, .cropper-point {
            display: none; /* Hide resizing handles since the circle box is now locked */
        }

        .preview-section {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #ddd;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #canvas {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>FCAI-CU 2027 Seniors 🎓</h1>
            <p>Upload your photo, adjust the selection, and generate your profile picture!</p>
        </header>

        <main>
            <div id="step-1" class="step-section active-step">
                <label for="imageUpload" class="btn btn-outline">
                    1. Choose Your Photo
                </label>
                <input type="file" id="imageUpload" accept="image/*">
            </div>

            <div id="step-2" class="step-section">
                <h3>Adjust Your Photo</h3>
                <p style="font-size: 14px; color: #666; margin-bottom: 15px;">Boundaries are disabled. Drag your photo anywhere or zoom out freely. Exposed areas turn white.</p>
                <div class="crop-container">
                    <img id="crop-image" src="" alt="To be cropped">
                </div>
                <button id="applyCropBtn" class="btn">2. Combine Image & Frame</button>
                <button id="backToUploadBtn" class="btn btn-outline" style="margin-top: 10px;">Choose a different photo</button>
            </div>

            <div id="step-3" class="step-section">
                <h3>Your Framed Photo</h3>
                <div class="preview-section">
                    <canvas id="canvas"></canvas>
                </div>
                <button id="downloadBtn" class="btn">3. Download Framed Photo</button>
                <button id="startOverBtn" class="btn btn-outline" style="margin-top: 10px;">Start Over</button>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

    <script>
        const imageUpload = document.getElementById('imageUpload');
        const cropImage = document.getElementById('crop-image');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const applyCropBtn = document.getElementById('applyCropBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const backToUploadBtn = document.getElementById('backToUploadBtn');
        const startOverBtn = document.getElementById('startOverBtn');

        const step1 = document.getElementById('step-1');
        const step2 = document.getElementById('step-2');
        const step3 = document.getElementById('step-3');

        let cropper = null;
        const frameSrc = 'frame.png'; 
        const frameImg = new Image();
        frameImg.src = frameSrc;

        function showStep(stepElement) {
            step1.classList.remove('active-step');
            step2.classList.remove('active-step');
            step3.classList.remove('active-step');
            stepElement.classList.add('active-step');
        }

        // STEP 1: Upload Handling
        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                cropImage.src = event.target.result;
                showStep(step2);

                if (cropper) {
                    cropper.destroy();
                }

                cropper = new Cropper(cropImage, {
                    aspectRatio: 1, 
                    viewMode: 0,             // Completely drops image canvas containment constraints
                    dragMode: 'move',        // Default to dragging the image layer, not the cropbox
                    autoCropArea: 1,         // Force cropbox to maximum size inside the container
                    cropBoxMovable: false,   // Keeps the cropbox completely fixed in the center
                    cropBoxResizable: false, // Prevents user from altering the central frame box dimensions
                    background: true,
                });
            };
            reader.readAsDataURL(file);
        });

        // STEP 2: Render Image Under Frame with White Padding Fill
        applyCropBtn.addEventListener('click', function() {
            if (!cropper) return;

            // Generate crop canvas. Setting fillStyle to '#ffffff' paints extended boundaries white
            const croppedCanvas = cropper.getCroppedCanvas({
                width: 1080,
                height: 1080,
                fillColor: '#ffffff' 
            });

            // Set final canvas frame dimensions
            canvas.width = frameImg.width || 1080;
            canvas.height = frameImg.height || 1080;

            // Clear previous contexts
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Render frame layer normally on top configuration
            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);

            // 2. Set layers to stack user input image strictly underneath transparent sections
            ctx.globalCompositeOperation = 'destination-over';
            
            // Mask user photo layout into a tidy circle format
            ctx.save();
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2, 0, Math.PI * 2, true);
            ctx.closePath();
            ctx.clip();

            // Draw cropped user layer beneath the frame canvas
            ctx.drawImage(croppedCanvas, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            // Reset composite rendering back to standard default
            ctx.globalCompositeOperation = 'source-over';

            showStep(step3);
        });

        // STEP 3: Safe Download Logic Execution
        downloadBtn.addEventListener('click', function() {
            try {
                const link = document.createElement('a');
                link.download = 'FCAI-CU-2027-Senior-Frame.png';
                link.href = canvas.toDataURL('image/png', 1.0); 
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (error) {
                alert("⚠️ Local Security Block:\n\nBrowsers block image downloads from canvas elements when run locally via file://.\n\nTo run successfully, push this project to GitHub Pages, Netlify, or open via 'Live Server' in VS Code.");
                console.error(error);
            }
        });

        backToUploadBtn.addEventListener('click', () => {
            imageUpload.value = "";
            showStep(step1);
        });

        startOverBtn.addEventListener('click', () => {
            imageUpload.value = "";
            showStep(step1);
        });
    </script>
</body>
</html>
